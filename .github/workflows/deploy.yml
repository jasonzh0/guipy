name: Publish

on:
  release:
    types: [created]

jobs:
  deploy:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install uv
      uses: astral-sh/setup-uv@v5
    - name: Set up Python
      run: uv python install 3.x
    - name: Build and publish
      run: |
        uv version $(git describe --tags --abbrev=0)
        uv build
        uv publish --token ${{ secrets.PYPI_TOKEN }}
